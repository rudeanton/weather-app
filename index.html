<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather app</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <form class="form">
      <input type="text" placeholder="Enter city" class="input" />
      <button type="submit" class="submitBtn">Get weather</button>
    </form>
    <div class="card">
      <h1 class="cityDisplay">Miami</h1>
      <p class="tempDisplay">Temp°C</p>
      <p class="humidityDiplay">Humidity%</p>
      <p class="descDisplay">Clouds</p>
      <p class="emojiDisplay">Emoji☀️</p>
    </div>
    <script src="./index.js"></script>
  </body>
</html>
